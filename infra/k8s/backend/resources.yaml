# Microservices: Auth, Profile, Weather, Market, Agent, Notification
# Each includes Deployment, Service, and HPA
---
# Auth Service
apiVersion: apps/v1
kind: Deployment
metadata:
  name: auth-service
  namespace: sroa
spec:
  replicas: 1
  selector:
    matchLabels:
      app: auth-service
  template:
    metadata:
      labels:
        app: auth-service
    spec:
      containers:
        - name: auth-service
          image: 815210276744.dkr.ecr.eu-west-1.amazonaws.com/sroa-auth-service:da5a259a14eb449f57d4decf27412fbcafcb3ce0
          ports:
            - containerPort: 8000
          envFrom:
            - configMapRef: { name: sroa-config }
            - secretRef: { name: sroa-secrets }
          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "200m"
              memory: "256Mi"
---
apiVersion: v1
kind: Service
metadata:
  name: auth-service
  namespace: sroa
spec:
  ports:
    - name: http
      port: 8000
      targetPort: 8000
  selector:
    app: auth-service
