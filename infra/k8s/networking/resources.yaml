apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: sroa-ingress
  namespace: sroa
  annotations:
    kubernetes.io/ingress.class: nginx
    nginx.ingress.kubernetes.io/use-regex: "true"
    nginx.ingress.kubernetes.io/rewrite-target: /$2
spec:
  rules:
  - http:
      paths:
      - path: /()(.*)
        pathType: ImplementationSpecific
        backend:
          service:
            name: frontend
            port: { number: 80 }
      - path: /api/auth(/|$)(.*)
        pathType: ImplementationSpecific
        backend:
          service:
            name: auth-service
            port: { number: 8000 }
      - path: /api/agent(/|$)(.*)
        pathType: ImplementationSpecific
        backend:
          service:
            name: agent-service
            port: { number: 8004 }
      - path: /api/weather(/|$)(.*)
        pathType: ImplementationSpecific
        backend:
          service:
            name: weather-service
            port: { number: 8002 }
      - path: /api/market(/|$)(.*)
        pathType: ImplementationSpecific
        backend:
          service:
            name: market-service
            port: { number: 8003 }
      - path: /api/user(/|$)(.*)
        pathType: ImplementationSpecific
        backend:
          service:
            name: user-profile-service
            port: { number: 8001 }
