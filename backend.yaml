# Microservices: Auth, Profile, Weather, Market, Agent, Notification
# Each includes Deployment, Service, and HPA
---
# Auth Service
apiVersion: apps/v1
kind: Deployment
metadata:
  name: auth-service
  namespace: backend
spec:
  replicas: 1
  selector:
    matchLabels:
      app: auth-service
  template:
    metadata:
      labels:
        app: auth-service
    spec:
      containers:
        - name: auth-service
          image: avinash974/3tier-app
          ports:
            - containerPort: 8000
          envFrom:
            - configMapRef: { name: sroa-config }
            - secretRef: { name: sroa-secrets }
          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "200m"
              memory: "256Mi"
---
apiVersion: v1
kind: Service
metadata:
  name: auth-service
  namespace: backend
spec:
  ports:
    - name: http
      port: 8000
      targetPort: 8000
  selector:
    app: auth-service
