name: CI/CD Pipeline

on:
  push:
    branches:
      - main

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout-Code-1
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 18
          cache: npm

      - name: Install dependencies
        run: npm ci || npm install

      - name: Build site
        run: npm run build
  Gitleaks-scan:
      runs-on: ubuntu-latest
      needs: build-and-deploy
      steps:
      - uses: actions/checkout@v4
        with: { fetch-depth: 0 }
      - name: Gitleaks Scan
        uses: gitleaks/gitleaks-action@v2
  Bandit:
    runs-on: ubuntu-latest
    needs: Gitleaks-scan
    steps:
      - uses: actions/checkout@v4
      - name: Bandit Security Scan
        run: |
          pip install bandit
          bandit -r ./backend -ll
  
  Trivy-scan:
      runs-on: ubuntu-latest
      needs: Bandit
      steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.x'

      - name: Install Trivy
        run: curl -sfL https://raw.githubusercontent.com/aquasecurity/trivy/main/contrib/install.sh | sh -s -- -b /usr/local/bin
  Shellcheck:
    runs-on: ubuntu-latest
    needs: Trivy-scan
    steps:
      - uses: actions/checkout@v4
      - name: ShellCheck Scripts Validation
        uses: ludeeus/action-shellcheck@master
        with:
          # Production Rule: Sirf apni scripts scan karo, node_modules ko ignore karo
          scandir: './'
          ignore_paths: 'node_modules'
  Snyk:
    runs-on: ubuntu-latest
    needs: Shellcheck
    continue-on-error: true # Added here because caller workflow doesn't support it with 'uses'
    steps:
      - uses: actions/checkout@v4
      - name: Snyk Dependency Scan
        uses: snyk/actions/python-3.10@master
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}      
  Docker:
    runs-on: ubuntu-latest
    needs: Snyk
    steps:
    - uses: actions/checkout@v4
    - name: Download JAR artifact
      uses: actions/download-artifact@v4
      with:
        name: app-jar
        path: app  # this will download JAR to ./app folder
        
    - name: Login to Docker Hub
      uses: docker/login-action@v3
      with:
        username: ${{ vars.DOCKER_USERNAME }}
        password: ${{ secrets.DOCKER_PASSWORD }}
    - name: Set up QEMU
      uses: docker/setup-qemu-action@v3
    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3
    - name: Build and Push Docker image
      uses: docker/build-push-action@v6
      with:
        context: .
        push: true
        tags: avinash974/3tier-app2:latest
        file: ./Dockerfile
