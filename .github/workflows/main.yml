name: CI/CD Pipeline

on:
  push:
    branches:
      - main

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 18
          cache: npm

      - name: Install dependencies
        run: npm ci || npm install

      - name: Build site
        run: npm run build
  Gitleaks-scan:
      runs-on: ubuntu-latest
      needs: build-and-deploy
      steps:
      - uses: actions/checkout@v4
        with: { fetch-depth: 0 }
      - name: Gitleaks Scan
        uses: gitleaks/gitleaks-action@v2
  Bandit:
    runs-on: ubuntu-latest
    needs: Gitleaks-scan
    steps:
      - uses: actions/checkout@v4
      - name: Bandit Security Scan
        run: |
          pip install bandit
          bandit -r ./backend -ll
  
  Trivy-scan:
      runs-on: ubuntu-latest
      needs: Bandit
      steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.x'

      - name: Install Trivy
        run: curl -sfL https://raw.githubusercontent.com/aquasecurity/trivy/main/contrib/install.sh | sh -s -- -b /usr/local/bin
  Snyk:
    runs-on: ubuntu-latest
    needs: Trivy-scan
    continue-on-error: true # Added here because caller workflow doesn't support it with 'uses'
    steps:
      - uses: actions/checkout@v4
      - name: Snyk Dependency Scan
        uses: snyk/actions/python-3.10@master
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}      
  SonarQube-scan:
      runs-on: ubuntu-latest
      needs: Trivy-scan
      steps:
      - name: Checkout code
        uses: actions/checkout@v4  
      - name: SonarQube Scan
        run: |
          mvn clean verify sonar:sonar \
          -DskipTests \
          -Dsonar.projectKey=votezy \
          -Dsonar.host.url=http://54.176.130.119:9000 \
          -Dsonar.token=${{ secrets.SONAR_TOKEN }}

      - name: Log in to Docker Hub
        env:
          DOCKER_USERNAME: ${{ secrets.DOCKER_USERNAME }}
          DOCKER_PASSWORD: ${{ secrets.DOCKER_PASSWORD }}
        run: |
          echo "$DOCKER_PASSWORD" | docker login -u "$DOCKER_USERNAME" --password-stdin
      - name: Pull OWASP ZAP Docker image
        run: docker pull ictu/zap2docker-weekly

      - name: Start OWASP ZAP scan
        run: |
          sudo chmod -R 777 $(pwd)  # Ensure the directory has the correct permissions
          docker run --network zap-network -v $(pwd):/zap/wrk/:rw -t ictu/zap2docker-weekly zap-baseline.py -t http://dast-automation-web:8080 -r zap_report.html || true
