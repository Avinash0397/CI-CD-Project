name: CI/CD Pipeline

on:
  push:
    branches:
      - main

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 18
          cache: npm

      - name: Install dependencies
        run: npm ci || npm install

      - name: Build site
        run: npm run build
  Gitleaks-scan:
      runs-on: ubuntu-latest
      needs: build-and-deploy
      steps:
      - uses: actions/checkout@v4
        with: { fetch-depth: 0 }
      - name: Gitleaks Scan
        uses: gitleaks/gitleaks-action@v2
  Bandit:
    runs-on: ubuntu-latest
    needs: Gitleaks-scan
    steps:
      - uses: actions/checkout@v4
      - name: Bandit Security Scan
        run: |
          pip install bandit
          bandit -r ./backend -ll
  
  Trivy-scan:
      runs-on: ubuntu-latest
      needs: Bandit
      steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.x'

      - name: Install Trivy
        run: curl -sfL https://raw.githubusercontent.com/aquasecurity/trivy/main/contrib/install.sh | sh -s -- -b /usr/local/bin
  Shellcheck:
    runs-on: ubuntu-latest
    needs: Trivy-scan
    steps:
      - uses: actions/checkout@v4
      - name: ShellCheck Scripts Validation
        uses: ludeeus/action-shellcheck@master
        with:
          # Production Rule: Sirf apni scripts scan karo, node_modules ko ignore karo
          scandir: './'
          ignore_paths: 'node_modules'
  Snyk:
    runs-on: ubuntu-latest
    needs: Shellcheck
    continue-on-error: true # Added here because caller workflow doesn't support it with 'uses'
    steps:
      - uses: actions/checkout@v4
      - name: Snyk Dependency Scan
        uses: snyk/actions/python-3.10@master
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}      
  Zap_scan:
    runs-on: ubuntu-latest
    needs: Snyk
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: ZAP Full Scan
        uses: zaproxy/action-full-scan@v0.12.0
        with:
          target: ${{ inputs.target_url }}
          # Production Rule: Automated reporting and issue creation
          issue_title: "Security: DAST Scan Alerts - ${{ github.sha }}"
          artifact_name: "zap-report-html"

      - name: Upload Scan Report
        uses: actions/upload-artifact@v4
        with:
          name: "zap-scan-results-${{ github.run_id }}"
          path: 'zap_report.html'

      - name: Start OWASP ZAP scan
        run: |
          sudo chmod -R 777 $(pwd)  # Ensure the directory has the correct permissions
          docker run --network zap-network -v $(pwd):/zap/wrk/:rw -t ictu/zap2docker-weekly zap-baseline.py -t http://dast-automation-web:8080 -r zap_report.html || true
