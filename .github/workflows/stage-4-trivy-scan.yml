name: "Stage 4: Trivy Scan"
on:
  workflow_call:
    inputs:
      service_name:
        required: true
        type: string
      image_tag:
        required: true
        type: string
jobs:
  trivy:
    runs-on: ubuntu-latest
    steps:
      - name: Download Image Artifact
        uses: actions/download-artifact@v4
        with:
          name: image-${{ inputs.service_name }}
      
      - name: Load Docker Image
        run: docker load < image.tar

      - name: Scan Image
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: sroa/${{ inputs.service_name }}:${{ inputs.image_tag }}
          exit-code: '1'
          severity: 'CRITICAL'
